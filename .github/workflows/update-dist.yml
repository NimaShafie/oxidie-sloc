name: Update dist bundles

# Run manually from the Actions tab, or automatically after every release tag.
# Builds fresh platform binaries, packages them as zip / tar.gz, and commits
# them to dist/ so the repo is always ready for air-gapped / offline deployment.
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── Build each platform binary ────────────────────────────────────────────
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            binary: oxidesloc
            bundle: oxidesloc-linux-x86_64.tar.gz

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: oxidesloc.exe
            bundle: oxidesloc-windows-x64.zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: dist-${{ matrix.target }}

      - name: Install musl tools (Linux only)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install -y musl-tools

      - name: Add cross-compilation target
        run: rustup target add ${{ matrix.target }}

      - name: Build
        run: cargo build --release -p oxidesloc --target ${{ matrix.target }}

      - name: Package — Linux tar.gz
        if: runner.os == 'Linux'
        run: |
          cp target/${{ matrix.target }}/release/oxidesloc /tmp/oxidesloc
          tar czf ${{ matrix.bundle }} -C /tmp oxidesloc

      - name: Package — Windows zip
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item "target\${{ matrix.target }}\release\oxidesloc.exe" "oxidesloc.exe"
          Compress-Archive -Path oxidesloc.exe -DestinationPath ${{ matrix.bundle }} -Force

      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.bundle }}
          path: ${{ matrix.bundle }}

  # ── Commit both bundles into dist/ ────────────────────────────────────────
  commit-dist:
    name: Commit dist bundles
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux bundle
        uses: actions/download-artifact@v4
        with:
          name: oxidesloc-linux-x86_64.tar.gz
          path: dist/

      - name: Download Windows bundle
        uses: actions/download-artifact@v4
        with:
          name: oxidesloc-windows-x64.zip
          path: dist/

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/oxidesloc-linux-x86_64.tar.gz dist/oxidesloc-windows-x64.zip
          git diff --cached --quiet && echo "dist already up to date" && exit 0
          git commit -m "chore: refresh dist bundles [skip ci]"
          git push
